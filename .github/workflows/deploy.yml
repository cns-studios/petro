name: Deploy Petro

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Log in to GitHub Packages
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v2
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/petro:latest

      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Create or update the docker-compose.yml file
            cat << EOF > docker-compose.yml
            version: '3.8'
            services:
              petro:
                image: ghcr.io/${{ github.repository }}/petro:latest
                ports:
                  - "8084:3000"
                volumes:
                  - petro-db:/usr/src/app/db
                restart: unless-stopped
            volumes:
              petro-db:
            EOF

            # Login to ghcr.io to pull the image
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Attempt graceful shutdown of the currently running container
            curl -X POST http://localhost:8084/shutdown || curl -X POST http://localhost:3000/shutdown || true
            sleep 10

            # Stop any running containers from previous deployments (both compose and non-compose)
            docker stop petro || true
            docker rm petro || true
            docker-compose down || true

            # Pull the latest image for the service
            docker-compose pull petro

            # Start the service in detached mode
            docker-compose up -d

            # Remove old, unused docker images
            docker image prune -a -f
